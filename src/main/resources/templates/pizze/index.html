<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Pizze Index</title>
  </head>
  <body>
    <header>
      <div class="container"><h1 class="text-uppercase">Index</h1></div>
    </header>

    <main>

      <div class="container">
        <a th:href="@{/pizze/create}" class="btn btn-primary">Aggiungi un libro</a>
      </div>


      <section th:if="${list.size() == 0}" class="mt-3">
        <div class="container">
          <h2>We don't have pizza</h2>
        </div>
      </section>

      <section th:unless="${list.size() == 0}" class="mt-3">
        <div class="container">
          <table class="table">
            <thead>
              <tr>
                <th scope="col">Id</th>
                <th scope="col">Nome</th>
                <th scope="col">Descrizione</th>
                <th scope="col">Foto url</th>
                <th scope="col">Prezzo</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="pizza : ${list}" th:object="${pizza}">
                <td scope="row" th:text="*{id}" />
                <td th:text="*{nome}" />
                <td th:text="*{descrizione}" />
                <td th:text="*{fotoUrl}" />
                <td th:text="|*{prezzo}€|" />
                <td><a th:href="@{/pizze/{id}(id=*{id})}" class="btn btn-primary">Dettagli</a></td>
                <td><a th:href="@{/pizze/edit/{id}(id=*{id})}" class="btn btn-secondary">Modifica</a></td>
                <td>
                  <form action="#" th:action="@{'/pizze/delete/{id}'(id=*{id})}" method="post">
                    <button class="btn btn-danger" type="submit" id="deleteButton">Elimina</button>
                </form>
              </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
