<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Create a Pizza</title>
  </head>

  <body>
    <header>
      <div class="container">
        <h1>Create a Pizza</h1>
      </div>
    </header>

    <main>
      <section class="mt-3">
        <div class="container">
          <form
            id="pizza-form"
            th:object="${pizza}"
            th:action="*{id != null} ? @{/pizze/edit/{id}(id=*{id})} : @{/pizze/create}"
            method="post"
            th:fragment="form"
          >
          <input type="hidden" th:field="*{id}">
            <div class="mb-3">
              <label for="nome" class="form-label">Nome</label>
              <input
                type="text"
                id="nome"
                th:field="*{nome}"
                class="form-control"
                th:errorClass="is-invalid"
              />
              <div th:if="${#fields.hasErrors('nome')}" class="invalid-feedback">
                <ul>
                    <li th:each="err : ${#fields.hasErrors('nome')}" th:text="${err}"/>
                </ul>
              </div>
            </div>

            <div class="mb-3">
              <label for="descrizione" class="form-label">Descrizione</label>
              <input
                type="text"
                id="descrizione"
                th:field="*{descrizione}"
                class="form-control"
              />
              <div th:if="${#fields.hasErrors('descrizione')}" class="invalid-feedback">
                <ul>
                    <li th:each="err : ${#fields.hasErrors('descrizione')}" th:text="${err}"/>
                </ul>
              </div>
            </div>

            <div class="mb-3">
              <label for="fotoUrl" class="form-label">Foto url</label>
              <input
                type="url"
                id="fotoUrl"
                th:field="*{fotoUrl}"
                class="form-control"
              />
              <div th:if="${#fields.hasErrors('fotoUrl')}" class="invalid-feedback">
                <ul>
                    <li th:each="err : ${#fields.hasErrors('fotoUrl')}" th:text="${err}"/>
                </ul>
              </div>
            </div>

            <div class="mb-3">
              <label for="prezzo" class="form-label">Prezzo</label>
              <input
                type="text"
                id="prezzo"
                th:field="*{prezzo}"
                class="form-control"
              />
              <div th:if="${#fields.hasErrors('prezzo')}" class="invalid-feedback">
                <ul>
                    <li th:each="err : ${#fields.hasErrors('prezzo')}" th:text="${err}"/>
                </ul>
              </div>
            </div>

            <div class="d-flex">
                <button type="submit" class="btn btn-primary me-2">Invia</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
