<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Offerte</title>
  </head>

  <body>
    <header>
      <h1>Offerte</h1>
    </header>

    <main>
      <section class="mt-3">
        <div class="container">
          <section th:if="${list.size() == 0}" class="mt-3">
            <div class="container">
              <h2>We don't have offers</h2>
            </div>
          </section>

          <section th:unless="${list.size() == 0}" class="mt-3">
            <div class="container">
              <table class="table">
                <thead>
                  <tr>
                    <th scope="col">Id</th>
                    <th scope="col">Titolo</th>
                    <th scope="col">Data di inizio</th>
                    <th scope="col">Data di fine</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="offerta : ${list}" th:object="${offerta}">
                    <td scope="row" th:text="*{id}" />
                    <td th:text="*{titolo}" />
                    <td th:text="*{dateStart}" />
                    <td th:text="*{dateEnd}" />
                    <td>
                      <a
                        th:href="@{/offerte/{id}(id=*{id})}"
                        class="btn btn-primary"
                        >Dettagli</a
                      >
                    </td>
                    <td>
                      <a
                        th:href="@{/offerte/edit/{id}(id=*{id})}"
                        class="btn btn-secondary"
                        >Modifica</a
                      >
                    </td>
                    <td>
                      <form
                        action="#"
                        th:action="@{'/offerte/delete/{id}'(id=*{id})}"
                        method="post"
                      >
                        <button
                          class="btn btn-danger"
                          type="submit"
                          id="deleteButton"
                        >
                          Elimina
                        </button>
                      </form>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
